<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dorm Tour (Pannellum)</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
  />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #panorama {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="panorama"></div>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    const HOTSPOT_DEBUG = false; // Set true while fine-tuning hotspot placement.

    const baseScene = {
      type: "equirectangular",
      autoLoad: true,
      hfov: 70,
      minHfov: 50,
      maxHfov: 90,
      haov: 110,
      vaov: 45,
      vOffset: 0,
      yaw: 0,
      pitch: 0,
      minYaw: -55,
      maxYaw: 55,
      minPitch: -22,
      maxPitch: 22,
      avoidShowingBackground: true
    };

    const viewer = pannellum.viewer("panorama", {
      default: {
        firstScene: "zapOne",
        sceneFadeDuration: 800,
        autoLoad: true,
        showControls: true,
        showFullscreenCtrl: true,
        hotSpotDebug: HOTSPOT_DEBUG
      },
      scenes: {
        zapOne: {
          ...baseScene,
          title: "ZAP One",
          panorama: "../dormPhotos/ZAP_One.jpeg",
          hotSpots: [
            // button to ZAP_Two
            {
              pitch: +3.5, // edit this line for up down (positive = up, negative = down)
              yaw: -18, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Go to ZAP Two",
              sceneId: "zapTwo",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        zapTwo: {
          ...baseScene,
          title: "ZAP Two",
          panorama: "../dormPhotos/ZAP_Two.jpeg",
          hotSpots: [
            // button to ZAP_One
            {
              pitch: 2, // edit this line for up down (positive = up, negative = down)
              yaw: +45, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Back to ZAP One",
              sceneId: "zapOne",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            },
            // button to ZAP_Three
            {
              pitch: 3, // edit this line for up down (positive = up, negative = down)
              yaw: -42, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Go to ZAP Three",
              sceneId: "zapThree",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        zapThree: {
          ...baseScene,
          title: "ZAP Three",
          panorama: "../dormPhotos/ZAP_Three.jpeg",
          hotSpots: [
            // button to ZAP_Two
            {
              pitch: 2, // edit this line for up down (positive = up, negative = down)
              yaw: 45, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Back to ZAP Two",
              sceneId: "zapTwo",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            },
            // button to ZAP_Four
            {
              pitch: 2, // edit this line for up down (positive = up, negative = down)
              yaw: 24, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Go to ZAP Four",
              sceneId: "zapFour",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        zapFour: {
          ...baseScene,
          title: "ZAP Four",
          panorama: "../dormPhotos/ZAP_Four.jpeg",
          hotSpots: [
            // button to ZAP_Three
            {
              pitch: -5, // edit this line for up down (positive = up, negative = down)
              yaw: -26, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Back to ZAP Three",
              sceneId: "zapThree",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            },
            // button to ZAP_Five
            {
              pitch: -4, // edit this line for up down (positive = up, negative = down)
              yaw: 22, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Go to ZAP Five",
              sceneId: "zapFive",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        zapFive: {
          ...baseScene,
          title: "ZAP Five",
          panorama: "../dormPhotos/ZAP_Five.jpeg",
          hotSpots: [
            // button to ZAP_Four
            {
              pitch: -5, // edit this line for up down (positive = up, negative = down)
              yaw: -28, // edit this line for left right (positive = right, negative = left)
              type: "scene",
              text: "Back to ZAP Four",
              sceneId: "zapFour",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        }
      }
    });
  </script>
</body>
</html>
