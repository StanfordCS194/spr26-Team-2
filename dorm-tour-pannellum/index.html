<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dorm Tour (Pannellum)</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
  />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #panorama {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="panorama"></div>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    const HOTSPOT_DEBUG = false; // Set true while fine-tuning hotspot placement.

    const baseScene = {
      type: "equirectangular",
      autoLoad: true,
      hfov: 70,
      minHfov: 50,
      maxHfov: 90,
      haov: 110,
      vaov: 45,
      vOffset: 0,
      yaw: 0,
      pitch: 0,
      minYaw: -55,
      maxYaw: 55,
      minPitch: -22,
      maxPitch: 22,
      avoidShowingBackground: true
    };

    const viewer = pannellum.viewer("panorama", {
      default: {
        firstScene: "entrance",
        sceneFadeDuration: 800,
        autoLoad: true,
        showControls: true,
        showFullscreenCtrl: true,
        hotSpotDebug: HOTSPOT_DEBUG
      },
      scenes: {
        entrance: {
          ...baseScene,
          title: "Entrance",
          panorama: "../dormPhotos/IMG_8152.jpeg",
          hotSpots: [
            {
              pitch: -4,
              yaw: 26,
              type: "scene",
              text: "Go to Lounge",
              sceneId: "lounge",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        lounge: {
          ...baseScene,
          title: "Lounge",
          panorama: "../dormPhotos/IMG_8153.jpeg",
          hotSpots: [
            {
              pitch: -5,
              yaw: -28,
              type: "scene",
              text: "Back to Entrance",
              sceneId: "entrance",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            },
            {
              pitch: -3,
              yaw: 24,
              type: "scene",
              text: "Continue to Hallway",
              sceneId: "hallway",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        hallway: {
          ...baseScene,
          title: "Hallway",
          panorama: "../dormPhotos/IMG_8154.jpeg",
          hfov: 68,
          haov: 105,
          vaov: 44,
          minYaw: -52,
          maxYaw: 52,
          hotSpots: [
            {
              pitch: -4,
              yaw: -24,
              type: "scene",
              text: "Back to Lounge",
              sceneId: "lounge",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            },
            {
              pitch: -2,
              yaw: 24,
              type: "scene",
              text: "Go to Kitchen Side",
              sceneId: "kitchen",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 70
            }
          ]
        },
        kitchen: {
          ...baseScene,
          title: "Kitchen Side",
          panorama: "../dormPhotos/IMG_8155.jpeg",
          hfov: 65,
          haov: 100,
          vaov: 40,
          minYaw: -50,
          maxYaw: 50,
          minPitch: -20,
          maxPitch: 20,
          hotSpots: [
            {
              pitch: -4,
              yaw: -24,
              type: "scene",
              text: "Back to Hallway",
              sceneId: "hallway",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 68
            },
            {
              pitch: -2,
              yaw: 23,
              type: "scene",
              text: "Go to Window View",
              sceneId: "window",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 75
            }
          ]
        },
        window: {
          ...baseScene,
          title: "Window View",
          panorama: "../dormPhotos/IMG_8156.jpeg",
          hfov: 75,
          maxHfov: 100,
          haov: 120,
          vaov: 50,
          minYaw: -60,
          maxYaw: 60,
          hotSpots: [
            {
              pitch: -4,
              yaw: -25,
              type: "scene",
              text: "Back to Kitchen Side",
              sceneId: "kitchen",
              targetYaw: 0,
              targetPitch: 0,
              targetHfov: 65
            }
          ]
        }
      }
    });
  </script>
</body>
</html>
